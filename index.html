<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Inventori Smart Bag</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#081225">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Inventori">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="toast" id="toast"></div>

    <div class="confirm-overlay" id="confirm-overlay">
        <div class="confirm-box">
            <p id="confirm-message"></p>
            <div class="confirm-btns">
                <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
                <button class="btn-confirm-danger" id="confirm-action-btn">Delete</button>
            </div>
        </div>
    </div>

    <div class="app-container">

        <div class="header" style="margin-bottom: 15px;">
            <img src="logo2.png" alt="Inventori Logo"
                style="height: 110px; width: auto; mix-blend-mode: screen; filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.5));">

            <div style="margin-top: 10px; display: flex; gap: 10px; justify-content: center;">
                <button id="ble-connect-btn" class="btn-primary"
                    style="padding: 10px 15px; font-size: 14px; width: auto; border-radius: 8px;"
                    onclick="connectBluetooth()">
                    Connect to Bag
                </button>
                <button class="btn-primary"
                    style="padding: 10px 15px; font-size: 14px; width: auto; border-radius: 8px; background-color: var(--danger);"
                    onclick="resetAllData()">
                    Reset Data
                </button>
            </div>
        </div>

        <div id="view-scan" class="view active">
            <div class="card" style="flex-grow: 1; overflow: hidden; display: flex; flex-direction: column;">
                <div class="section-title">Active Profile</div>
                <select id="profile-selector" onchange="renderScanList()"></select>
                <div id="scan-list" style="margin-top: 15px; overflow-y: auto; padding-right: 5px; flex-grow: 1;"></div>

                <div style="margin-top: auto; padding-top: 15px; border-top: 1px solid var(--surface);">
                    <div
                        style="display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; color: var(--text-muted); margin-bottom: 8px;">
                        <span>Short Range (Bag Only)</span>
                        <span>Max Range (Room Scale)</span>
                    </div>
                    <input type="range" id="scan-range-slider" min="180" max="200" value="185" dir="rtl"
                        style="width: 100%; accent-color: var(--primary);">
                </div>
            </div>
            <div id="scan-result" style="text-align: center; font-weight: bold; height: 20px; flex-shrink: 0;"></div>
            <button class="btn-primary" id="scan-btn" onclick="triggerScan()">Scan Backpack</button>
        </div>

        <div id="view-organize" class="view">
            <div class="split-layout">
                <div class="library-col">
                    <div class="section-title">All Items</div>
                    <div id="master-library"></div>
                    <div id="library-empty" class="empty-state" style="display:none;">
                        Pair a tag first via the ➕ tab.
                    </div>
                </div>

                <div class="bins-col">
                    <div class="add-bag-form">
                        <input type="text" id="new-bag-input" placeholder="New Bag Name..."
                            onkeydown="handleBagEnter(event)">
                        <button class="add-bag-btn" onclick="createNewBag()">+</button>
                    </div>
                    <div id="dynamic-bins-container" style="display:flex; flex-direction:column; gap: 15px;"></div>
                    <div id="bins-empty" class="empty-state" style="display:none;">
                        Create a bag above to get started.
                    </div>
                </div>
            </div>
        </div>

        <div id="view-pair" class="view">
            <div class="card" style="overflow: hidden;">
                <div class="section-title">Pair New Tag</div>

                <div style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--surface);">
                    <div
                        style="display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; color: var(--text-muted); margin-bottom: 8px;">
                        <span>Strict (Must Touch)</span>
                        <span>Loose (Few Inches)</span>
                    </div>
                    <input type="range" id="pair-range-slider" min="205" max="222" value="215" dir="rtl"
                        style="width: 100%; accent-color: var(--success);">
                </div>

                <div id="pairing-idle" style="text-align: center;">
                    <button class="btn-primary" onclick="startPairing()">Listen for Tag</button>
                </div>

                <div id="pairing-active" class="radar-box" style="display: none;">
                    <div class="pulse-ring"></div>
                    <p style="color: var(--primary); font-weight: 600; margin-top: 20px;">Scanning for hardware...</p>
                </div>

                <div id="pairing-success" style="display: none;">
                    <p id="pairing-status-title" style="color: var(--success); font-weight: bold; margin-bottom: 10px;">
                        New Tag Found!</p>
                    <p style="font-family: monospace; color: var(--text-muted); margin-bottom: 15px;">ID: <span
                            id="new-tag-id"></span></p>
                    <input type="text" id="new-tag-name" placeholder="Name (e.g., Caliper, Folder)"
                        onkeydown="handlePairEnter(event)">
                    <button class="btn-primary" onclick="saveNewTag()">Save to Library</button>
                </div>
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchView('scan', this)"><span
                class="nav-icon">🔍</span><span>Scan</span></div>
        <div class="nav-item" onclick="switchView('organize', this)"><span
                class="nav-icon">🎒</span><span>Organize</span></div>
        <div class="nav-item" onclick="switchView('pair', this)"><span class="nav-icon">➕</span><span>Pair</span></div>
    </div>

    <script src="app.js"></script>
    <script>
        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>

</html>
