<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Inventori Smart Bag</title>
    <style>
        :root {
            --bg-color: #081225;
            --card-bg: #122340;
            --primary: #00E5FF;
            --text-main: #F4F7F6;
            --text-muted: #8A9EBF;
            --success: #34C759;
            --danger: #FF3B30;
            --surface: #1A2F52;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 229, 255, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 229, 255, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            height: calc(100vh - 70px);
            height: calc(100dvh - 70px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .view {
            display: none;
            flex-direction: column;
            gap: 20px;
            height: 100%;
            flex-grow: 1;
            overflow: hidden;
        }

        .view.active {
            display: flex;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .section-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .btn-primary {
            background-color: var(--primary);
            color: var(--bg-color);
            border: none;
            border-radius: 20px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        select,
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background-color: var(--surface);
            color: var(--text-main);
            font-size: 16px;
            margin-bottom: 10px;
            outline: none;
            flex-shrink: 0;
        }

        /* ORGANIZE SPLIT-VIEW */
        .split-layout {
            display: flex;
            gap: 15px;
            height: 100%;
            align-items: stretch;
            overflow: hidden;
            padding-bottom: 10px;
        }

        .library-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--surface);
            padding-right: 10px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .master-item {
            background-color: var(--surface);
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: grab;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid transparent;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            transition: border-color 0.15s, background-color 0.15s;
        }

        .master-item.dragging {
            opacity: 0.5;
            border-color: var(--primary);
        }

        .master-item:active {
            cursor: grabbing;
        }

        .master-item-name {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .item-actions {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
            margin-left: 6px;
        }

        .action-btn {
            cursor: pointer;
            opacity: 0.4;
            font-size: 13px;
            padding: 4px;
            transition: 0.2s;
            border: none;
            background: none;
            line-height: 1;
        }

        .action-btn:hover,
        .action-btn:active {
            opacity: 1;
        }

        .inline-rename {
            background: var(--bg-color);
            border: 1px solid var(--primary);
            border-radius: 4px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 600;
            padding: 2px 6px;
            width: 100%;
            outline: none;
            font-family: inherit;
        }

        .bins-col {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            overflow-x: hidden;
            padding-left: 5px;
        }

        .profile-bin {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 10px;
            min-height: 60px;
            border: 2px dashed var(--text-muted);
            transition: 0.2s;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 6px;
            flex-shrink: 0;
        }

        .profile-bin.drag-over {
            background-color: rgba(0, 229, 255, 0.1);
            border-color: var(--primary);
        }

        .bin-tag {
            background-color: var(--primary);
            color: var(--bg-color);
            padding: 6px 10px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: fit-content;
        }

        .remove-btn {
            cursor: pointer;
            font-weight: 900;
            opacity: 0.6;
            padding: 0 4px;
        }

        .remove-btn:hover,
        .remove-btn:active {
            opacity: 1;
        }

        .bag-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .bag-header .section-title {
            margin-bottom: 0;
        }

        .delete-bag-btn {
            cursor: pointer;
            opacity: 0.35;
            font-size: 12px;
            padding: 2px 6px;
            transition: 0.2s;
            border: none;
            background: none;
            color: var(--text-muted);
        }

        .delete-bag-btn:hover,
        .delete-bag-btn:active {
            opacity: 1;
            color: var(--danger);
        }

        .add-bag-form {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .add-bag-form input {
            margin-bottom: 0;
            flex-grow: 1;
            padding: 10px;
            font-size: 14px;
        }

        .add-bag-btn {
            background-color: var(--primary);
            color: var(--bg-color);
            border: none;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .add-bag-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        /* SCAN LIST */
        .item-row {
            background-color: var(--surface);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            flex-shrink: 0;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--text-muted);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .status-dot.found {
            background-color: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .status-dot.missing {
            background-color: var(--danger);
            box-shadow: 0 0 8px var(--danger);
        }

        /* RADAR ANIMATION */
        .radar-box {
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }

        .pulse-ring {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--primary);
            animation: radar 1.5s ease-out infinite;
        }

        @keyframes radar {
            0% {
                transform: scale(0.5);
                opacity: 1;
            }

            100% {
                transform: scale(3);
                opacity: 0;
            }
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 400px;
            background-color: var(--card-bg);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            padding-bottom: max(15px, env(safe-area-inset-bottom));
            border-top: 1px solid var(--surface);
            z-index: 10;
        }

        .nav-item {
            color: var(--text-muted);
            font-size: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
            justify-content: center;
            transition: color 0.15s;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-icon {
            font-size: 20px;
        }

        /* TOAST & MODALS */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background-color: var(--card-bg);
            border: 1px solid var(--primary);
            color: var(--text-main);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            z-index: 100;
            transition: transform 0.3s ease;
            pointer-events: none;
            max-width: 350px;
            text-align: center;
        }

        .toast.visible {
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            border-color: var(--danger);
        }

        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 50;
            justify-content: center;
            align-items: center;
        }

        .confirm-overlay.active {
            display: flex;
        }

        .confirm-box {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 24px;
            max-width: 300px;
            width: 90%;
            text-align: center;
        }

        .confirm-box p {
            margin-bottom: 20px;
            font-size: 15px;
            line-height: 1.4;
        }

        .confirm-btns {
            display: flex;
            gap: 10px;
        }

        .confirm-btns button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.15s;
        }

        .confirm-btns button:active {
            transform: scale(0.96);
        }

        .btn-cancel {
            background: var(--surface);
            color: var(--text-main);
        }

        .btn-confirm-danger {
            background: var(--danger);
            color: white;
        }

        .empty-state {
            color: var(--text-muted);
            text-align: center;
            padding: 20px 10px;
            font-size: 14px;
            line-height: 1.5;
        }

        .touch-ghost {
            position: fixed;
            z-index: 999;
            pointer-events: none;
            background-color: var(--primary);
            color: var(--bg-color);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(0, 229, 255, 0.4);
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <div class="toast" id="toast"></div>

    <div class="confirm-overlay" id="confirm-overlay">
        <div class="confirm-box">
            <p id="confirm-message"></p>
            <div class="confirm-btns">
                <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
                <button class="btn-confirm-danger" id="confirm-action-btn">Delete</button>
            </div>
        </div>
    </div>

    <div class="app-container">

        <div class="header" style="margin-bottom: 15px;">
            <img src="logo2.png" alt="Inventori Logo"
                style="height: 110px; width: auto; mix-blend-mode: screen; filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.5));">

            <div style="margin-top: 10px; display: flex; gap: 10px; justify-content: center;">
                <button id="ble-connect-btn" class="btn-primary"
                    style="padding: 10px 15px; font-size: 14px; width: auto; border-radius: 8px;"
                    onclick="connectBluetooth()">
                    Connect to Bag
                </button>
                <button class="btn-primary"
                    style="padding: 10px 15px; font-size: 14px; width: auto; border-radius: 8px; background-color: var(--danger);"
                    onclick="resetAllData()">
                    Reset Data
                </button>
            </div>
        </div>

        <div id="view-scan" class="view active">
            <div class="card" style="flex-grow: 1; overflow: hidden; display: flex; flex-direction: column;">
                <div class="section-title">Active Profile</div>
                <select id="profile-selector" onchange="renderScanList()"></select>
                <div id="scan-list" style="margin-top: 15px; overflow-y: auto; padding-right: 5px; flex-grow: 1;"></div>

                <div style="margin-top: auto; padding-top: 15px; border-top: 1px solid var(--surface);">
                    <div
                        style="display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; color: var(--text-muted); margin-bottom: 8px;">
                        <span>Short Range (Bag Only)</span>
                        <span>Max Range (Room Scale)</span>
                    </div>
                    <input type="range" id="scan-range-slider" min="190" max="200" value="195" dir="rtl"
                        style="width: 100%; accent-color: var(--primary);">
                </div>
            </div>
            <div id="scan-result" style="text-align: center; font-weight: bold; height: 20px; flex-shrink: 0;"></div>
            <button class="btn-primary" id="scan-btn" onclick="triggerScan()">Scan Backpack</button>
        </div>

        <div id="view-organize" class="view">
            <div class="split-layout">
                <div class="library-col">
                    <div class="section-title">All Items</div>
                    <div id="master-library"></div>
                    <div id="library-empty" class="empty-state" style="display:none;">
                        Pair a tag first via the ➕ tab.
                    </div>
                </div>

                <div class="bins-col">
                    <div class="add-bag-form">
                        <input type="text" id="new-bag-input" placeholder="New Bag Name..."
                            onkeydown="handleBagEnter(event)">
                        <button class="add-bag-btn" onclick="createNewBag()">+</button>
                    </div>
                    <div id="dynamic-bins-container" style="display:flex; flex-direction:column; gap: 15px;"></div>
                    <div id="bins-empty" class="empty-state" style="display:none;">
                        Create a bag above to get started.
                    </div>
                </div>
            </div>
        </div>

        <div id="view-pair" class="view">
            <div class="card" style="overflow: hidden;">
                <div class="section-title">Pair New Tag</div>

                <div style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--surface);">
                    <div
                        style="display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; color: var(--text-muted); margin-bottom: 8px;">
                        <span>Strict (Must Touch)</span>
                        <span>Loose (Few Inches)</span>
                    </div>
                    <input type="range" id="pair-range-slider" min="212" max="222" value="217" dir="rtl"
                        style="width: 100%; accent-color: var(--success);">
                </div>

                <div id="pairing-idle" style="text-align: center;">
                    <button class="btn-primary" onclick="startPairing()">Listen for Tag</button>
                </div>

                <div id="pairing-active" class="radar-box" style="display: none;">
                    <div class="pulse-ring"></div>
                    <p style="color: var(--primary); font-weight: 600; margin-top: 20px;">Scanning for hardware...</p>
                </div>

                <div id="pairing-success" style="display: none;">
                    <p id="pairing-status-title" style="color: var(--success); font-weight: bold; margin-bottom: 10px;">
                        New Tag Found!</p>
                    <p style="font-family: monospace; color: var(--text-muted); margin-bottom: 15px;">ID: <span
                            id="new-tag-id"></span></p>
                    <input type="text" id="new-tag-name" placeholder="Name (e.g., Caliper, Folder)"
                        onkeydown="handlePairEnter(event)">
                    <button class="btn-primary" onclick="saveNewTag()">Save to Library</button>
                </div>
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchView('scan', this)"><span
                class="nav-icon">🔍</span><span>Scan</span></div>
        <div class="nav-item" onclick="switchView('organize', this)"><span
                class="nav-icon">🎒</span><span>Organize</span></div>
        <div class="nav-item" onclick="switchView('pair', this)"><span class="nav-icon">➕</span><span>Pair</span></div>
    </div>

    <script>
        // ==================== WEB BLUETOOTH API ====================
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        let bleDevice = null;
        let bleChar = null;

        // Scan State & Smoothing Variables
        let isScanningBag = false;
        let itemsFoundThisScan = new Set();
        let tagHistory = {};
        const HISTORY_LENGTH = 3;

        async function connectBluetooth() {
            try {
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Inventori-Bag' }],
                    optionalServices: [SERVICE_UUID]
                });

                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleChar = await service.getCharacteristic(CHARACTERISTIC_UUID);

                await bleChar.startNotifications();
                bleChar.addEventListener('characteristicvaluechanged', handleIncomingTag);
                bleDevice.addEventListener('gattserverdisconnected', onBleDisconnected);

                const btn = document.getElementById('ble-connect-btn');
                btn.innerText = "🔵 Bag Connected";
                btn.style.backgroundColor = "var(--success)";
                showToast("Connected to Inventori Hardware!");

            } catch (error) {
                console.error("Bluetooth Error:", error);
                showToast("Bluetooth connection failed.", true);
            }
        }

        function onBleDisconnected() {
            bleChar = null;
            bleDevice = null;
            const btn = document.getElementById('ble-connect-btn');
            btn.innerText = "Connect to Bag";
            btn.style.backgroundColor = "";
            showToast("Bag disconnected.", true);
        }

        // INTELLIGENT PARSER WITH SMOOTHING
        function handleIncomingTag(event) {
            const value = new TextDecoder().decode(event.target.value);
            const parts = value.trim().split(':');
            if (parts.length !== 2) return;

            const cleanID = parts[0];
            const rawRssi = parseInt(parts[1]);

            // --- SMOOTHING ALGORITHM ---
            if (!tagHistory[cleanID]) {
                tagHistory[cleanID] = [];
            }

            tagHistory[cleanID].push(rawRssi);

            if (tagHistory[cleanID].length > HISTORY_LENGTH) {
                tagHistory[cleanID].shift();
            }

            const sum = tagHistory[cleanID].reduce((a, b) => a + b, 0);
            const avgRssi = sum / tagHistory[cleanID].length;

            // --- 1. PAIRING TAB LOGIC ---
            if (document.getElementById('view-pair').classList.contains('active')) {
                const pairThreshold = parseInt(document.getElementById('pair-range-slider').value);

                // Check against the smoothed average instead of raw RSSI
                if (avgRssi >= pairThreshold) {
                    document.getElementById('pairing-active').style.display = 'none';
                    document.getElementById('pairing-success').style.display = 'block';

                    const titleEl = document.getElementById('pairing-status-title');
                    const nameInput = document.getElementById('new-tag-name');
                    document.getElementById('new-tag-id').innerText = cleanID;

                    if (masterItems[cleanID]) {
                        titleEl.innerText = "Tag Already Paired!";
                        titleEl.style.color = "var(--primary)";
                        nameInput.value = masterItems[cleanID].name;
                        showToast("Tag detected. You can rename it.");
                    } else {
                        titleEl.innerText = "New Tag Found!";
                        titleEl.style.color = "var(--success)";
                        nameInput.value = '';
                    }
                    nameInput.focus();
                }
            }

            // --- 2. BAG SCANNING TAB LOGIC ---
            if (isScanningBag) {
                const scanThreshold = parseInt(document.getElementById('scan-range-slider').value);

                // Check against the smoothed average
                if (avgRssi >= scanThreshold) {
                    itemsFoundThisScan.add(cleanID);

                    const dot = document.getElementById(`status-${cleanID}`);
                    if (dot && !dot.classList.contains('found')) {
                        dot.classList.add('found');
                        if (navigator.vibrate) navigator.vibrate(10);
                    }
                }
            }
        }

        // ==================== LIVE BAG SCAN ====================
        function renderScanList() {
            const activeProfileId = document.getElementById('profile-selector').value;
            const container = document.getElementById('scan-list');
            document.getElementById('scan-result').innerText = '';

            if (!activeProfileId || !profiles[activeProfileId]) {
                container.innerHTML = `<p class="empty-state">No bags yet. Create one in Organize.</p>`;
                return;
            }

            const activeItems = profiles[activeProfileId].items;
            container.innerHTML = '';

            if (activeItems.length === 0) {
                container.innerHTML = `<p class="empty-state">No items assigned to this bag.</p>`;
                return;
            }
            activeItems.forEach(id => {
                if (!masterItems[id]) return;
                container.innerHTML += `<div class="item-row"><span>${masterItems[id].name}</span><div class="status-dot" id="status-${id}"></div></div>`;
            });
        }

        function triggerScan() {
            if (!bleChar) {
                showToast("Please Connect to Bag first!", true);
                return;
            }

            const activeProfileId = document.getElementById('profile-selector').value;
            if (!activeProfileId || !profiles[activeProfileId]) return;

            const activeItems = profiles[activeProfileId].items;
            const btn = document.getElementById('scan-btn');
            const resultText = document.getElementById('scan-result');

            if (activeItems.length === 0) return;

            isScanningBag = true;
            itemsFoundThisScan.clear();

            btn.innerText = "Scanning Bag...";
            btn.disabled = true;
            document.querySelectorAll('.status-dot').forEach(el => el.className = 'status-dot');

            resultText.innerText = "Listening for tags...";
            resultText.style.color = "var(--primary)";

            // Stop reading after 4 seconds and calculate results
            setTimeout(() => {
                isScanningBag = false;
                btn.innerText = "Scan Backpack";
                btn.disabled = false;

                let missingCount = 0;
                activeItems.forEach(id => {
                    const dot = document.getElementById(`status-${id}`);
                    if (!dot) return;

                    if (!itemsFoundThisScan.has(id)) {
                        dot.classList.add('missing');
                        missingCount++;
                    }
                });

                if (missingCount > 0) {
                    resultText.innerText = `${missingCount} Item(s) Missing!`;
                    resultText.style.color = 'var(--danger)';
                    showToast("Missing items detected!", true);
                } else {
                    resultText.innerText = `All Items Present`;
                    resultText.style.color = 'var(--success)';
                    showToast("Bag is packed and ready!");
                }
            }, 4000);
        }

        // ==================== PERSISTENCE ====================
        const STORAGE_KEY = 'inventori_data';

        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) return JSON.parse(raw);
            } catch (e) {
                console.warn('Failed to load saved data');
            }
            return null;
        }

        function saveData() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    masterItems,
                    profiles,
                    version: 1
                }));
            } catch (e) { }
        }

        function resetAllData() {
            showConfirm("WARNING: This will wipe all tags and bags from memory. Are you sure?", () => {
                localStorage.removeItem(STORAGE_KEY);
                masterItems = {};
                profiles = {};
                saveData();
                renderOrganizer();
                renderDropdown();
                renderScanList();
                showToast("All data wiped. Fresh start!");
            }, "Wipe Data");
        }

        // ==================== DATA STATE ====================
        const saved = loadData();
        let masterItems = saved ? saved.masterItems : {};
        let profiles = saved ? saved.profiles : {};

        for (const profile of Object.values(profiles)) {
            profile.items = profile.items.filter(id => masterItems[id]);
        }

        // ==================== TOAST & CONFIRM ====================
        let toastTimer = null;
        function showToast(msg, isError = false) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast' + (isError ? ' error' : '');
            void el.offsetWidth;
            el.classList.add('visible');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove('visible'), 2500);
        }

        function showConfirm(message, onConfirm, btnLabel = 'Delete') {
            document.getElementById('confirm-message').textContent = message;
            document.getElementById('confirm-action-btn').textContent = btnLabel;
            document.getElementById('confirm-action-btn').onclick = () => {
                closeConfirm();
                onConfirm();
            };
            document.getElementById('confirm-overlay').classList.add('active');
        }

        function closeConfirm() {
            document.getElementById('confirm-overlay').classList.remove('active');
        }

        // ==================== UI HANDLERS ====================
        function handleBagEnter(event) {
            if (event.key === 'Enter') { event.preventDefault(); createNewBag(); }
        }

        function handlePairEnter(event) {
            if (event.key === 'Enter') { event.preventDefault(); saveNewTag(); }
        }

        function createNewBag() {
            const inputField = document.getElementById('new-bag-input');
            const bagName = inputField.value.trim();
            if (bagName === '') return;
            const safeId = bagName.toLowerCase().replace(/[^a-z0-9]/g, '') + '_' + Math.floor(Math.random() * 10000);
            profiles[safeId] = { name: bagName, items: [] };
            inputField.value = '';
            saveData();
            renderOrganizer();
            renderDropdown();
            renderScanList();
        }

        function deleteProfile(profileId) {
            const name = profiles[profileId].name;
            showConfirm(`Delete "${name}" and all its assignments?`, () => {
                delete profiles[profileId];
                saveData();
                renderOrganizer();
                renderDropdown();
                renderScanList();
            });
        }

        function isDuplicateName(newName, excludeId = null) {
            const checkName = newName.trim().toLowerCase();
            for (const [id, item] of Object.entries(masterItems)) {
                if (id !== excludeId && item.name.toLowerCase() === checkName) return true;
            }
            return false;
        }

        function startRename(id) {
            const nameSpan = document.getElementById('name-' + id);
            const currentName = masterItems[id].name;
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'inline-rename';
            input.value = currentName;
            nameSpan.replaceWith(input);
            input.focus();
            input.select();

            function commitRename() {
                const newName = input.value.trim();
                if (newName === '' || newName === currentName) {
                    renderOrganizer();
                    return;
                }
                if (isDuplicateName(newName, id)) {
                    showToast(`Item "${newName}" already exists.`, true);
                    renderOrganizer();
                    return;
                }
                masterItems[id].name = newName;
                saveData();
                renderOrganizer();
                if (document.getElementById('view-scan').classList.contains('active')) renderScanList();
            }
            input.addEventListener('blur', commitRename);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
                if (e.key === 'Escape') { renderOrganizer(); }
            });
        }

        function deleteItem(id) {
            const name = masterItems[id].name;
            showConfirm(`Delete "${name}" from your library? It will be removed from all bags.`, () => {
                delete masterItems[id];
                for (const profile of Object.values(profiles)) {
                    profile.items = profile.items.filter(i => i !== id);
                }
                saveData();
                renderOrganizer();
                renderDropdown();
                renderScanList();
            });
        }

        function switchView(viewName, navElement) {
            const leavingPair = document.getElementById('view-pair').classList.contains('active');
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + viewName).classList.add('active');
            navElement.classList.add('active');
            if (viewName === 'organize') renderOrganizer();
            if (viewName === 'scan') { renderDropdown(); renderScanList(); }
            if (leavingPair && viewName !== 'pair') {
                document.getElementById('pairing-idle').style.display = 'block';
                document.getElementById('pairing-active').style.display = 'none';
                document.getElementById('pairing-success').style.display = 'none';
            }
        }

        function renderDropdown() {
            const selector = document.getElementById('profile-selector');
            const currentValue = selector.value;
            selector.innerHTML = '';
            const profileKeys = Object.keys(profiles);
            if (profileKeys.length === 0) {
                selector.innerHTML = '<option value="">No bags yet</option>';
                return;
            }
            for (const [id, profile] of Object.entries(profiles)) {
                selector.innerHTML += `<option value="${id}">${profile.name}</option>`;
            }
            if (profiles[currentValue]) selector.value = currentValue;
        }

        function renderOrganizer() {
            const libraryContainer = document.getElementById('master-library');
            const emptyLib = document.getElementById('library-empty');
            libraryContainer.innerHTML = '';
            const itemKeys = Object.keys(masterItems);
            emptyLib.style.display = itemKeys.length === 0 ? 'block' : 'none';

            for (const [id, item] of Object.entries(masterItems)) {
                const el = document.createElement('div');
                el.className = 'master-item';
                el.draggable = true;
                el.dataset.tagId = id;
                el.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', id);
                    el.classList.add('dragging');
                });
                el.addEventListener('dragend', () => el.classList.remove('dragging'));
                el.innerHTML = `
                    <span class="master-item-name" id="name-${id}">${item.name}</span>
                    <span class="item-actions">
                        <button class="action-btn" onclick="startRename('${id}')" title="Rename">✏️</button>
                        <button class="action-btn delete-item-btn" onclick="deleteItem('${id}')" title="Delete">🗑</button>
                    </span>
                `;
                setupTouchDrag(el, id);
                libraryContainer.appendChild(el);
            }

            const binsContainer = document.getElementById('dynamic-bins-container');
            const emptyBins = document.getElementById('bins-empty');
            binsContainer.innerHTML = '';
            const profileKeys = Object.keys(profiles);
            emptyBins.style.display = profileKeys.length === 0 ? 'block' : 'none';

            for (const [profileId, profile] of Object.entries(profiles)) {
                let binContent = '';
                profile.items.forEach(id => {
                    const itemName = masterItems[id] ? masterItems[id].name : 'Unknown';
                    binContent += `<div class="bin-tag">${itemName}<span class="remove-btn" onclick="removeFromProfile('${profileId}', '${id}')">×</span></div>`;
                });
                const binDiv = document.createElement('div');
                binDiv.innerHTML = `
                    <div class="bag-header">
                        <div class="section-title">${profile.name}</div>
                        <button class="delete-bag-btn" onclick="deleteProfile('${profileId}')" title="Delete Bag">🗑 Delete</button>
                    </div>
                    <div class="profile-bin" id="bin-${profileId}" data-profile-id="${profileId}">
                        ${binContent}
                    </div>
                `;
                binsContainer.appendChild(binDiv);

                const bin = binDiv.querySelector('.profile-bin');
                bin.addEventListener('dragover', (e) => { e.preventDefault(); bin.classList.add('drag-over'); });
                bin.addEventListener('dragleave', () => bin.classList.remove('drag-over'));
                bin.addEventListener('drop', (e) => {
                    e.preventDefault();
                    bin.classList.remove('drag-over');
                    const tagId = e.dataTransfer.getData('text/plain');
                    if (tagId && !profiles[profileId].items.includes(tagId) && masterItems[tagId]) {
                        profiles[profileId].items.push(tagId);
                        saveData();
                        renderOrganizer();
                    }
                });
            }
        }

        function removeFromProfile(profileId, tagId) {
            profiles[profileId].items = profiles[profileId].items.filter(id => id !== tagId);
            saveData();
            renderOrganizer();
        }

        let touchGhost = null;
        let touchDragId = null;
        function setupTouchDrag(el, tagId) {
            let longPressTimer = null, isDragging = false, startX, startY;
            el.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX; startY = e.touches[0].clientY;
                longPressTimer = setTimeout(() => {
                    isDragging = true; touchDragId = tagId; el.classList.add('dragging');
                    touchGhost = document.createElement('div');
                    touchGhost.className = 'touch-ghost'; touchGhost.textContent = masterItems[tagId].name;
                    document.body.appendChild(touchGhost);
                    positionGhost(e.touches[0]);
                    if (navigator.vibrate) navigator.vibrate(30);
                }, 300);
            }, { passive: true });
            el.addEventListener('touchmove', (e) => {
                if (!isDragging && longPressTimer) {
                    if (Math.abs(e.touches[0].clientX - startX) > 10 || Math.abs(e.touches[0].clientY - startY) > 10) {
                        clearTimeout(longPressTimer); longPressTimer = null;
                    }
                    return;
                }
                if (!isDragging) return;
                e.preventDefault();
                positionGhost(e.touches[0]); highlightBinUnderTouch(e.touches[0]);
            }, { passive: false });
            el.addEventListener('touchend', (e) => {
                clearTimeout(longPressTimer); longPressTimer = null;
                if (!isDragging) return;
                const bin = getBinUnderTouch(e.changedTouches[0]);
                if (bin && touchDragId) {
                    const profileId = bin.dataset.profileId;
                    if (!profiles[profileId].items.includes(touchDragId) && masterItems[touchDragId]) {
                        profiles[profileId].items.push(touchDragId); saveData();
                    }
                }
                cleanupTouchDrag(); isDragging = false; renderOrganizer();
            });
            el.addEventListener('touchcancel', () => { clearTimeout(longPressTimer); cleanupTouchDrag(); isDragging = false; });
        }
        function positionGhost(touch) { if (touchGhost) { touchGhost.style.left = (touch.clientX - 40) + 'px'; touchGhost.style.top = (touch.clientY - 40) + 'px'; } }
        function highlightBinUnderTouch(touch) {
            document.querySelectorAll('.profile-bin').forEach(b => b.classList.remove('drag-over'));
            const bin = getBinUnderTouch(touch); if (bin) bin.classList.add('drag-over');
        }
        function getBinUnderTouch(touch) {
            if (touchGhost) touchGhost.style.display = 'none';
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            if (touchGhost) touchGhost.style.display = '';
            return el ? el.closest('.profile-bin') : null;
        }
        function cleanupTouchDrag() {
            if (touchGhost) { touchGhost.remove(); touchGhost = null; }
            touchDragId = null;
            document.querySelectorAll('.master-item.dragging').forEach(el => el.classList.remove('dragging'));
            document.querySelectorAll('.profile-bin.drag-over').forEach(b => b.classList.remove('drag-over'));
        }

        // ==================== PAIRING & SAVING ====================
        function startPairing() {
            if (!bleChar) { showToast("Please Connect to Bag first!", true); return; }
            document.getElementById('pairing-idle').style.display = 'none';
            document.getElementById('pairing-active').style.display = 'flex';
        }

        function saveNewTag() {
            const id = document.getElementById('new-tag-id').innerText;
            const finalName = document.getElementById('new-tag-name').value.trim();

            if (!finalName) {
                showToast("Please enter a name for this item.", true);
                document.getElementById('new-tag-name').focus();
                return;
            }

            if (isDuplicateName(finalName, id)) {
                showToast(`Item "${finalName}" already exists.`, true);
                return;
            }

            masterItems[id] = { name: finalName };
            saveData();
            showToast(`"${finalName}" saved!`);
            document.getElementById('pairing-success').style.display = 'none';
            document.getElementById('pairing-idle').style.display = 'block';
            renderOrganizer();
        }

        // INIT
        renderDropdown();
        renderScanList();
        renderOrganizer();
    </script>
</body>

</html>
